# ZMK Studio is enabled per-build via cmake-args in build.yaml (the *_studio
# artifact), NOT here — so the normal firmware stays lean.

# ---- Mouse / pointing (used by the Mouse layer) ----
CONFIG_ZMK_POINTING=y

# ---- Displays (nice!view on the Zen) ----
CONFIG_ZMK_DISPLAY=y

# ---- Power ----
CONFIG_ZMK_SLEEP=y

# ---- Optional: bump BLE TX power for range/reliability ----
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
